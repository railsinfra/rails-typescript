# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to NPM in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/railsinfra/rails-typescript/actions/workflows/publish-npm.yml
name: Publish NPM
on:
  workflow_dispatch:

  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          pnpm install

      - name: Publish to NPM
        env:
          RAILS_NPM_DEBUG_LOG: ${{ github.workspace }}/.cursor/debug-b1c583.log
        run: |
          mkdir -p "$(dirname "$RAILS_NPM_DEBUG_LOG")"
          bash ./bin/publish-npm

      - name: Upload publish debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-npm-debug-b1c583
          path: .cursor/debug-b1c583.log
          if-no-files-found: warn
